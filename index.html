<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#090A12" />
  <title>名古屋北陸旅行 App</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --bg: #090a12;
      --bg-2: #111322;
      --text: #f7f7fb;
      --muted: rgba(247,247,251,.62);
      --soft: rgba(255,255,255,.10);
      --hairline: rgba(255,255,255,.16);
      --card: rgba(255,255,255,.12);
      --card-2: rgba(255,255,255,.075);
      --accent: #ff375f;
      --accent-2: #7c5cff;
      --blue: #0a84ff;
      --green: #30d158;
      --orange: #ff9f0a;
      --radius-xl: 30px;
      --radius-lg: 23px;
      --radius-md: 17px;
      --shadow: 0 24px 70px rgba(0,0,0,.38);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, "Noto Sans TC", "PingFang HK", "Microsoft JhengHei", sans-serif;
      --ease-spring: cubic-bezier(.2, .9, .18, 1);
    }

    body[data-theme="light"] {
      --bg: #f7f8fd;
      --bg-2: #ffffff;
      --text: #15151d;
      --muted: rgba(22,22,30,.58);
      --soft: rgba(0,0,0,.06);
      --hairline: rgba(0,0,0,.10);
      --card: rgba(255,255,255,.74);
      --card-2: rgba(255,255,255,.58);
      --shadow: 0 22px 58px rgba(48,62,105,.16);
      background:
        radial-gradient(circle at 10% 4%, rgba(255,149,0,.22), transparent 31%),
        radial-gradient(circle at 92% 8%, rgba(10,132,255,.18), transparent 32%),
        radial-gradient(circle at 66% 88%, rgba(255,45,85,.15), transparent 36%),
        linear-gradient(180deg, #fbfcff 0%, #f1f4fb 48%, #ffffff 100%);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 18% 8%, rgba(255,55,95,.45), transparent 29%),
        radial-gradient(circle at 88% 4%, rgba(10,132,255,.42), transparent 29%),
        radial-gradient(circle at 70% 88%, rgba(124,92,255,.40), transparent 34%),
        linear-gradient(180deg, #090a12 0%, #111322 48%, #070710 100%);
      overflow: hidden;
      touch-action: pan-x pan-y;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.7), transparent 72%);
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }

    .topbar {
      position: fixed;
      z-index: 40;
      inset: 0 0 auto 0;
      padding: calc(12px + var(--safe-top)) 16px 10px;
      background: linear-gradient(180deg, rgba(9,10,18,.88), rgba(9,10,18,.54) 70%, rgba(9,10,18,0));
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }

    .topbar-inner {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .app-title { display: flex; gap: 12px; align-items: center; min-width: 0; }
    .app-icon {
      width: 46px; height: 46px; border-radius: 15px;
      background: linear-gradient(145deg, #ff5a7a, #6b54ff 54%, #00c7ff);
      display: grid; place-items: center;
      box-shadow: 0 12px 30px rgba(255,55,95,.28);
      font-size: 24px;
      flex: 0 0 auto;
    }
    .app-title h1 {
      margin: 0;
      font-size: clamp(18px, 5vw, 25px);
      letter-spacing: -.5px;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app-title p { margin: 5px 0 0; color: var(--muted); font-size: 12px; font-weight: 650; }

    .toolbar { display: flex; gap: 8px; align-items: center; }
    .pill-btn {
      color: var(--text);
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      min-height: 38px;
      padding: 0 13px;
      font-weight: 800;
      box-shadow: inset 0 1px rgba(255,255,255,.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .pill-btn.primary { background: linear-gradient(135deg, #ff375f, #7c5cff); border-color: transparent; }
    .pill-btn.warn { background: rgba(255,159,10,.14); color: #ffd69a; }
    .pill-btn:active { transform: scale(.98); }

    .status-line {
      max-width: 860px;
      margin: 10px auto 0;
      color: rgba(255,255,255,.58);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 0 4px;
    }
    .edit-badge {
      display: none;
      color: #ffd1dc;
      font-weight: 800;
    }
    body.editing .edit-badge { display: inline; }

    .pager {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100dvh;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .pager::-webkit-scrollbar { display: none; }

    .day-page {
      flex: 0 0 100vw;
      height: 100dvh;
      overflow-y: auto;
      scroll-snap-align: start;
      padding: calc(116px + var(--safe-top)) 16px calc(116px + var(--safe-bottom));
      -webkit-overflow-scrolling: touch;
    }
    .day-wrap { max-width: 860px; margin: 0 auto; }

    .hero {
      position: relative;
      overflow: hidden;
      min-height: 188px;
      padding: 22px;
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.20), rgba(255,255,255,.07)),
        radial-gradient(circle at 92% 18%, rgba(255,255,255,.22), transparent 28%);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(30px) saturate(1.25);
      -webkit-backdrop-filter: blur(30px) saturate(1.25);
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: -60% -30% auto auto;
      width: 230px; height: 230px;
      border-radius: 80px;
      background: linear-gradient(135deg, rgba(255,55,95,.85), rgba(10,132,255,.42));
      transform: rotate(32deg);
      filter: blur(.2px);
      opacity: .95;
    }
    .hero::after {
      content: "✈︎";
      position: absolute;
      right: 18px; top: 20px;
      font-size: 86px;
      color: rgba(255,255,255,.18);
      transform: rotate(-12deg);
    }
    .hero-content { position: relative; z-index: 1; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      color: rgba(255,255,255,.76);
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .2px;
    }
    .hero h2 {
      margin: 18px 0 5px;
      font-size: clamp(42px, 15vw, 78px);
      line-height: .88;
      letter-spacing: -3px;
    }
    .hero .date { color: rgba(255,255,255,.72); font-size: 15px; font-weight: 750; }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 19px; }
    .stat {
      border-radius: 999px;
      padding: 8px 11px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.82);
      font-size: 12px;
      font-weight: 760;
    }
    .hero-actions { display: none; margin-top: 16px; gap: 8px; }
    body.editing .hero-actions { display: flex; flex-wrap: wrap; }

    .timeline {
      position: relative;
      margin-top: 24px;
      padding-left: 18px;
    }
    .timeline::before {
      content: "";
      position: absolute;
      top: 6px; bottom: 22px; left: 7px;
      width: 3px;
      border-radius: 999px;
      background: linear-gradient(to bottom, rgba(255,55,95,.9), rgba(124,92,255,.7), rgba(255,255,255,.08));
    }

    .event-card {
      position: relative;
      margin: 0 0 16px;
      padding: 17px 17px 16px;
      border-radius: 25px;
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.08));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 14px 44px rgba(0,0,0,.24);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      transition: transform .22s ease, background .22s ease, border-color .22s ease;
    }
    .event-card::before {
      content: "";
      position: absolute;
      left: -17px; top: 23px;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(255,55,95,.12), 0 0 0 1px rgba(255,255,255,.35);
    }
    body.editing .event-card { border-color: rgba(255,255,255,.26); }
    body.editing .event-card:active { transform: scale(.995); }

    .card-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .time {
      display: inline-flex; align-items: center; gap: 6px;
      color: #ffd1dc;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: .1px;
    }
    .tag {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; gap: 5px;
      max-width: 44%;
      color: rgba(255,255,255,.78);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 790;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-title {
      margin: 12px 0 8px;
      font-size: 20px;
      line-height: 1.22;
      letter-spacing: -.35px;
      color: #fff;
      font-weight: 920;
    }
    .event-title.empty { color: rgba(255,255,255,.42); font-style: italic; }
    .desc {
      margin: 0;
      color: rgba(255,255,255,.72);
      font-size: 14.5px;
      line-height: 1.52;
      white-space: normal;
    }
    .hotel {
      margin-top: 13px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(10,132,255,.14);
      border: 1px solid rgba(10,132,255,.22);
      color: #cae4ff;
      font-weight: 760;
      font-size: 13px;
      line-height: 1.43;
    }
    .memo {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      color: #fff5ce;
      background: rgba(255,204,0,.12);
      border: 1px solid rgba(255,204,0,.18);
      border-radius: 15px;
      font-size: 13px;
      line-height: 1.45;
    }
    .memo:not(:empty) { display: block; }

    .card-actions {
      display: none;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,.10);
      padding-top: 12px;
    }
    body.editing .card-actions { display: flex; }
    .mini-btn {
      color: rgba(255,255,255,.88);
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 850;
    }
    .mini-btn.danger { color: #ffd3d3; background: rgba(255,59,48,.13); }
    .mini-btn.good { color: #d7ffe3; background: rgba(48,209,88,.14); }

    .empty-day {
      padding: 24px;
      border-radius: 24px;
      text-align: center;
      color: rgba(255,255,255,.62);
      background: rgba(255,255,255,.08);
      border: 1px dashed rgba(255,255,255,.20);
    }

    .day-rail {
      position: fixed;
      z-index: 45;
      left: 0; right: 0; bottom: 0;
      padding: 10px 12px calc(10px + var(--safe-bottom));
      background: linear-gradient(180deg, rgba(9,10,18,0), rgba(9,10,18,.72) 28%, rgba(9,10,18,.92));
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }
    .rail-scroll {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 9px;
      overflow-x: auto;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      padding: 4px 2px;
    }
    .rail-scroll::-webkit-scrollbar { display: none; }
    .day-tab {
      flex: 0 0 auto;
      width: 72px;
      min-height: 56px;
      border-radius: 20px;
      background: rgba(255,255,255,.10);
      color: rgba(255,255,255,.60);
      border: 1px solid rgba(255,255,255,.12);
      display: grid;
      place-items: center;
      padding: 7px;
      transition: all .24s ease;
    }
    .day-tab strong { display:block; font-size: 16px; line-height: 1; color: inherit; }
    .day-tab span { display:block; margin-top:4px; font-size: 10px; font-weight: 850; color: inherit; opacity:.8; white-space:nowrap; }
    .day-tab.active {
      width: 86px;
      color: white;
      background: linear-gradient(135deg, rgba(255,55,95,.92), rgba(124,92,255,.92));
      border-color: transparent;
      box-shadow: 0 14px 32px rgba(124,92,255,.26);
      transform: translateY(-2px);
    }

    .fab {
      position: fixed;
      z-index: 50;
      right: 16px;
      bottom: calc(90px + var(--safe-bottom));
      width: 58px; height: 58px;
      border-radius: 22px;
      display: none;
      place-items: center;
      color: white;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff375f, #7c5cff);
      box-shadow: 0 18px 50px rgba(255,55,95,.33);
    }
    body.editing .fab { display: grid; }

    .toast {
      position: fixed;
      z-index: 80;
      left: 50%; bottom: calc(92px + var(--safe-bottom));
      transform: translate(-50%, 12px);
      opacity: 0;
      pointer-events: none;
      color: white;
      background: rgba(20,20,28,.78);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: 0 14px 36px rgba(0,0,0,.35);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      font-weight: 820;
      font-size: 13px;
      transition: all .25s ease;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .sheet-backdrop {
      position: fixed;
      z-index: 90;
      inset: 0;
      display: none;
      background: rgba(0,0,0,.50);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      align-items: flex-end;
      justify-content: center;
    }
    .sheet-backdrop.open { display: flex; }
    .sheet {
      width: min(100%, 780px);
      max-height: calc(92dvh - var(--safe-top));
      overflow-y: auto;
      border-radius: 30px 30px 0 0;
      padding: 12px 16px calc(18px + var(--safe-bottom));
      color: var(--text);
      background: rgba(22,23,34,.94);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 -22px 70px rgba(0,0,0,.48);
    }
    .grabber { width: 42px; height: 5px; border-radius: 999px; background: rgba(255,255,255,.24); margin: 2px auto 14px; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .sheet-header h3 { margin: 0; font-size: 21px; letter-spacing: -.3px; }
    .close-btn { width: 38px; height: 38px; border-radius: 50%; color: white; background: rgba(255,255,255,.12); font-weight: 900; }

    .form-grid { display: grid; gap: 12px; }
    label { display: grid; gap: 7px; color: rgba(255,255,255,.72); font-size: 12px; font-weight: 850; letter-spacing: .2px; }
    input, textarea, select {
      width: 100%;
      color: white;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 17px;
      padding: 13px 14px;
      outline: none;
    }
    textarea { min-height: 92px; resize: vertical; line-height: 1.45; }
    input:focus, textarea:focus, select:focus { border-color: rgba(255,55,95,.62); box-shadow: 0 0 0 4px rgba(255,55,95,.12); }
    .form-actions { display: flex; gap: 9px; margin-top: 16px; }
    .form-actions .pill-btn { flex: 1; min-height: 48px; }
    .helper { color: rgba(255,255,255,.48); font-size: 12px; line-height: 1.45; margin: 10px 2px 0; }

    .backup-row {
      display: none;
      max-width: 860px;
      margin: 10px auto 0;
      gap: 8px;
      padding: 0 4px;
      overflow-x: auto;
    }
    body.editing .backup-row { display: flex; }
    .backup-row .pill-btn { min-height: 34px; font-size: 12px; padding: 0 11px; flex: 0 0 auto; }
    #importFile { display: none; }

    .theme-toggle { min-width: 42px; padding: 0 12px; }
    .now-btn { display: inline-flex; align-items: center; gap: 5px; }

    .event-card.is-now {
      border-color: rgba(48,209,88,.62);
      box-shadow: 0 18px 54px rgba(48,209,88,.16), 0 14px 44px rgba(0,0,0,.22);
    }
    .event-card.is-now::before { background: var(--green); box-shadow: 0 0 0 7px rgba(48,209,88,.15), 0 0 22px rgba(48,209,88,.55); }
    .event-card.is-next { border-color: rgba(255,159,10,.42); }
    .event-card.is-next::before { background: var(--orange); box-shadow: 0 0 0 6px rgba(255,159,10,.13); }
    .live-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-left: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      color: white;
      background: rgba(48,209,88,.22);
      border: 1px solid rgba(48,209,88,.35);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: .2px;
      vertical-align: 1px;
    }
    .live-chip.next { background: rgba(255,159,10,.19); border-color: rgba(255,159,10,.33); }

    .day-page.active .hero { animation: heroIn .46s var(--ease-spring) both; }
    .day-page.active .event-card { animation: cardIn .46s var(--ease-spring) both; animation-delay: min(calc(var(--i, 0) * 34ms), 260ms); }
    .day-page.active .event-card.focus-pulse { animation: focusPulse .85s var(--ease-spring) both; }
    .sheet-backdrop.open .sheet { animation: sheetIn .34s var(--ease-spring) both; }
    .sheet-backdrop.open { animation: fadeIn .22s ease both; }

    @keyframes heroIn { from { opacity: .35; transform: translateY(18px) scale(.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes cardIn { from { opacity: 0; transform: translateY(18px) scale(.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes focusPulse { 0% { transform: translateY(0) scale(1); } 42% { transform: translateY(-3px) scale(1.012); } 100% { transform: translateY(0) scale(1); } }
    @keyframes sheetIn { from { transform: translateY(22px) scale(.985); opacity: .78; } to { transform: translateY(0) scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    body, .topbar, .day-rail, .event-card, .hero, .pill-btn, .day-tab, .sheet, input, textarea, select, .toast {
      transition: background .35s ease, color .35s ease, border-color .35s ease, box-shadow .35s ease, opacity .25s ease, transform .25s ease;
    }

    body[data-theme="light"]::before {
      background-image: linear-gradient(rgba(0,0,0,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,.025) 1px, transparent 1px);
    }
    body[data-theme="light"] .topbar {
      background: linear-gradient(180deg, rgba(250,252,255,.88), rgba(250,252,255,.62) 72%, rgba(250,252,255,0));
    }
    body[data-theme="light"] .day-rail {
      background: linear-gradient(180deg, rgba(250,252,255,0), rgba(250,252,255,.76) 28%, rgba(250,252,255,.94));
    }
    body[data-theme="light"] .pill-btn {
      color: var(--text);
      background: rgba(255,255,255,.72);
      border-color: rgba(0,0,0,.08);
      box-shadow: inset 0 1px rgba(255,255,255,.7), 0 8px 24px rgba(40,55,90,.08);
    }
    body[data-theme="light"] .pill-btn.primary { color: white; background: linear-gradient(135deg, #ff2d55, #6b54ff); }
    body[data-theme="light"] .pill-btn.warn { color: #8a4b00; background: rgba(255,159,10,.16); }
    body[data-theme="light"] .status-line { color: rgba(20,20,30,.55); }
    body[data-theme="light"] .edit-badge { color: #b30f35; }
    body[data-theme="light"] .hero {
      background: linear-gradient(145deg, rgba(255,255,255,.84), rgba(255,255,255,.56)), radial-gradient(circle at 92% 18%, rgba(10,132,255,.14), transparent 29%);
      border-color: rgba(255,255,255,.72);
    }
    body[data-theme="light"] .eyebrow { color: rgba(20,20,30,.68); background: rgba(255,255,255,.58); border-color: rgba(0,0,0,.06); }
    body[data-theme="light"] .hero h2, body[data-theme="light"] .event-title { color: #11131a; }
    body[data-theme="light"] .hero .date, body[data-theme="light"] .stat { color: rgba(20,20,30,.65); }
    body[data-theme="light"] .stat, body[data-theme="light"] .tag, body[data-theme="light"] .mini-btn {
      background: rgba(255,255,255,.62);
      border-color: rgba(0,0,0,.07);

      restorePageScroll(dayIndex, top);
    }

    function scrollToEvent(dayIndex, eventIndex, behavior = "smooth") {
      const page = getPage(dayIndex);
      if (!page || eventIndex === null || eventIndex === undefined) return;
      const card = page.querySelector(`.event-card[data-event="${eventIndex}"]`);
      if (!card) return;
      const pageRect = page.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      const top = page.scrollTop + cardRect.top - pageRect.top - 16;
      page.scrollTo({ top: Math.max(0, top), behavior });
      card.classList.remove("focus-pulse");
      void card.offsetWidth;
      card.classList.add("focus-pulse");
      setTimeout(() => card.classList.remove("focus-pulse"), 1000);
    }

    function jumpToNow(smooth = true) {
      const focus = refreshMomentFocus();
      render();
      if (!focus) return goToDay(0, smooth);
      const behavior = smooth ? "smooth" : "auto";
      goToDay(focus.dayIndex, smooth);
      requestAnimationFrame(() => setTimeout(() => scrollToEvent(focus.dayIndex, focus.eventIndex, behavior), smooth ? 180 : 0));
      const stateText = focus.state === "now" ? "目前行程" : focus.state === "next" ? "下一個行程" : focus.outside === "before" ? "旅程第一天" : focus.outside === "after" ? "旅程最後一天" : "今日行程";
      showToast(`已定位到${stateText}`);
    }
    function persist(show = true) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trip));
      const now = new Date();
      saveStatus.textContent = "已儲存：" + now.toLocaleTimeString("zh-HK", { hour: "2-digit", minute: "2-digit" });
      if (show) showToast("已儲存到此裝置");
    }
    function escapeHTML(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    function lines(value = "") { return escapeHTML(value).replace(/\n/g, "<br>"); }
    function compactDate(date = "") {
      const m = date.match(/(\d+月\d+日).*?(週.)/);
      return m ? `${m[1]}` : date.replace(/\s*-\s*Day\s*\d+/i, "").slice(0, 8);
    }
    function tagIcon(tag = "") {
      const t = tag.toLowerCase();
      if (/早餐|午餐|晚餐|餐|咖啡|壽司|鰻|燒肉|豬排/.test(tag)) return "🍽️";
      if (/駕|車|自駕|租車|還車/.test(tag)) return "🚗";
      if (/鐵|地鐵|交通|乘|站/.test(tag)) return "🚆";
      if (/購|商|店|藥妝|百貨/.test(tag)) return "🛍️";
      if (/觀光|步行|城|園|街|展望|纜車/.test(tag)) return "📍";
      if (/休息|酒店|飯店|住宿/.test(tag)) return "🛏️";
      if (/手續|機場|登機|退房|入住/.test(tag)) return "🧾";
      return "✨";
    }
    function dayStats(day) {
      const total = day.events.length;
      const food = day.events.filter(e => /早餐|午餐|晚餐|餐|咖啡|壽司|燒肉|鰻|豬排/.test(e.tag + e.title + e.desc)).length;
      const move = day.events.filter(e => /駕|車|鐵|地鐵|機場|交通|乘|站/.test(e.tag + e.title + e.desc)).length;
      return { total, food, move };
    }

    function render() {
      renderPages();
      renderRail();
      syncActiveUI(false);
      document.body.classList.toggle("editing", editMode);
    }

    function renderPages() {
      pager.innerHTML = trip.map((day, dayIndex) => {
        const stats = dayStats(day);
        const eventsHTML = day.events.length ? day.events.map((event, eventIndex) => renderEvent(event, dayIndex, eventIndex)).join("") : `
          <div class="empty-day">
            <strong>這天暫時沒有行程</strong><br>開啟「修改」後按右下角＋新增。
          </div>`;
        return `
          <section class="day-page" id="day-${dayIndex + 1}" data-day="${dayIndex}">
            <div class="day-wrap">
              <div class="hero">
                <div class="hero-content">
                  <span class="eyebrow">🧭 Swipe Travel Planner</span>
                  <h2>${escapeHTML(day.day || `Day ${dayIndex + 1}`)}</h2>
                  <div class="date">${escapeHTML(day.date || "未設定日期")}</div>
                  <div class="stats">
                    <span class="stat">${stats.total} 個行程</span>
                    <span class="stat">${stats.food} 個美食點</span>
                    <span class="stat">${stats.move} 段交通</span>
                  </div>
                  <div class="hero-actions">
                    <button class="mini-btn good" type="button" data-action="add" data-day="${dayIndex}">＋ 新增行程</button>
                    <button class="mini-btn" type="button" data-action="edit-day" data-day="${dayIndex}">修改日期</button>
                  </div>
                </div>
              </div>
              <div class="timeline">${eventsHTML}</div>
            </div>
          </section>`;
      }).join("");
    }

    function renderEvent(event, dayIndex, eventIndex) {
      const title = event.title ? escapeHTML(event.title) : "未命名行程";
      const titleClass = event.title ? "event-title" : "event-title empty";
      return `
        <article class="event-card${momentClass(dayIndex, eventIndex)}" style="--i:${eventIndex}" data-day="${dayIndex}" data-event="${eventIndex}">
          <div class="card-top">
            <div class="time">🕒 ${escapeHTML(event.time || "未設定時間")} ${momentChip(dayIndex, eventIndex)}</div>
            <div class="tag" title="${escapeHTML(event.tag || "")}">${tagIcon(event.tag)} ${escapeHTML(event.tag || "行程")}</div>
          </div>
          <h3 class="${titleClass}">${title}</h3>
          ${event.desc ? `<p class="desc">${lines(event.desc)}</p>` : `<p class="desc">未有行程內容。</p>`}
          ${event.hotel ? `<div class="hotel">🏨 ${lines(event.hotel)}</div>` : ""}
          <div class="memo">${event.memo ? "📝 " + lines(event.memo) : ""}</div>
          <div class="card-actions">
            <button class="mini-btn" type="button" data-action="edit" data-day="${dayIndex}" data-event="${eventIndex}">修改</button>
            <button class="mini-btn" type="button" data-action="duplicate" data-day="${dayIndex}" data-event="${eventIndex}">複製</button>
            <button class="mini-btn danger" type="button" data-action="delete" data-day="${dayIndex}" data-event="${eventIndex}">刪除</button>
          </div>
        </article>`;
    }

    function renderRail() {
      dayRail.innerHTML = trip.map((day, index) => `
        <button class="day-tab" type="button" data-goto="${index}" aria-label="前往 ${escapeHTML(day.day)}">
          <span>${escapeHTML(compactDate(day.date))}</span>
          <strong>D${index + 1}</strong>
        </button>`).join("");
    }

    function syncActiveUI(scrollTab = true) {
      const day = trip[activeDay] || trip[0];
      $$(".day-tab").forEach((tab, index) => tab.classList.toggle("active", index === activeDay));
      $$(".day-page").forEach((page, index) => page.classList.toggle("active", index === activeDay));
      if (day) {
        currentDayLabel.textContent = `${day.date || day.day}`;
        const liveText = momentFocus && momentFocus.dayIndex === activeDay
          ? (momentFocus.state === "now" ? "・LIVE" : momentFocus.state === "next" ? "・NEXT" : "")
          : "";
        countStatus.textContent = `${day.events.length} 個行程${liveText}`;
      }
      if (scrollTab) {
        const active = $(".day-tab.active");
        if (active) active.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      }
    }

    function goToDay(index, smooth = true, scrollTab = true) {
      activeDay = Math.max(0, Math.min(index, trip.length - 1));
      pager.scrollTo({ left: activeDay * window.innerWidth, behavior: smooth ? "smooth" : "auto" });
      syncActiveUI(scrollTab);
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove("show"), 1900);
    }

    function openEventEditor(dayIndex, eventIndex = null) {
      editorState = { mode: "event", dayIndex, eventIndex };
      const isNew = eventIndex === null;
      const event = isNew ? { time: "", title: "", tag: "", desc: "", hotel: "", memo: "" } : trip[dayIndex].events[eventIndex];
      $("#sheetTitle").textContent = isNew ? "新增行程" : "修改行程";
      $("#eventForm").hidden = false;
      $("#dayForm").hidden = true;
      $("#fTime").value = event.time || "";
      $("#fTag").value = event.tag || "";
      $("#fTitle").value = event.title || "";
      $("#fDesc").value = event.desc || "";
      $("#fHotel").value = event.hotel || "";
      $("#fMemo").value = event.memo || "";
      openSheet();
      setTimeout(() => $("#fTime").focus(), 80);
    }

    function openDayEditor(dayIndex) {
      editorState = { mode: "day", dayIndex, eventIndex: null };
      const day = trip[dayIndex];
      $("#sheetTitle").textContent = "修改日子資料";
      $("#eventForm").hidden = true;
      $("#dayForm").hidden = false;
      $("#dDay").value = day.day || "";
      $("#dDate").value = day.date || "";
      openSheet();
      setTimeout(() => $("#dDay").focus(), 80);
    }

    function openSheet() {
      sheetBackdrop.classList.add("open");
      sheetBackdrop.setAttribute("aria-hidden", "false");
    }
    function closeSheet() {
      sheetBackdrop.classList.remove("open");
      sheetBackdrop.setAttribute("aria-hidden", "true");
    }

    function saveEventFromForm(event) {
      event.preventDefault();
      const payload = {
        id: editorState.eventIndex === null ? `custom-${Date.now()}` : trip[editorState.dayIndex].events[editorState.eventIndex].id,
        time: $("#fTime").value.trim(),
        title: $("#fTitle").value.trim(),
        tag: $("#fTag").value.trim(),
        desc: $("#fDesc").value.trim(),
        hotel: $("#fHotel").value.trim(),
        memo: $("#fMemo").value.trim(),
        done: false
      };
      const keepDay = editorState.dayIndex;
      const keepTop = getPageScrollTop(keepDay);
      if (editorState.eventIndex === null) trip[keepDay].events.push(payload);
      else trip[keepDay].events[editorState.eventIndex] = payload;
      closeSheet();
      refreshMomentFocus();
      renderKeepingScroll(keepDay, keepTop);
      persist(false);
      showToast("行程已更新並儲存");
    }

    function saveDayFromForm(event) {
      event.preventDefault();
      const day = trip[editorState.dayIndex];
      day.day = $("#dDay").value.trim() || day.day;
      day.date = $("#dDate").value.trim() || day.date;
      const keepTop = getPageScrollTop(editorState.dayIndex);
      closeSheet();
      refreshMomentFocus();
      renderKeepingScroll(editorState.dayIndex, keepTop);
      persist(false);
      showToast("日子資料已更新");
    }

    function handleAction(action, dayIndex, eventIndex) {
      const events = trip[dayIndex].events;
      const keepTop = getPageScrollTop(dayIndex);
      if (action === "add") return openEventEditor(dayIndex, null);
      if (action === "edit-day") return openDayEditor(dayIndex);
      if (action === "edit") return openEventEditor(dayIndex, eventIndex);
      if (action === "duplicate") {
        const copy = deepClone(events[eventIndex]);
        copy.id = `copy-${Date.now()}`;
        copy.title = copy.title ? copy.title + "（複製）" : "新行程";
        events.splice(eventIndex + 1, 0, copy);
      }
      if (action === "delete") {
        const ok = confirm("確定刪除此行程？");
        if (!ok) return;
        events.splice(eventIndex, 1);
      }
      refreshMomentFocus();
      renderKeepingScroll(dayIndex, keepTop);
      persist(false);
      showToast("變更已儲存");
    }

    pager.addEventListener("scroll", () => {
      if (scrollRaf) cancelAnimationFrame(scrollRaf);
      scrollRaf = requestAnimationFrame(() => {
        const next = Math.round(pager.scrollLeft / window.innerWidth);
        if (next !== activeDay) {
          activeDay = Math.max(0, Math.min(next, trip.length - 1));
          syncActiveUI();
        }
      });
    }, { passive: true });

    window.addEventListener("resize", () => goToDay(activeDay, false));

    document.addEventListener("click", (event) => {
      const goto = event.target.closest("[data-goto]");
      if (goto) return goToDay(Number(goto.dataset.goto));

      const actionBtn = event.target.closest("[data-action]");
      if (actionBtn) {
        const dayIndex = Number(actionBtn.dataset.day);
        const eventIndex = actionBtn.dataset.event === undefined ? null : Number(actionBtn.dataset.event);
        return handleAction(actionBtn.dataset.action, dayIndex, eventIndex);
      }

      const card = event.target.closest(".event-card");
      if (editMode && card && !event.target.closest("button")) {
        return openEventEditor(Number(card.dataset.day), Number(card.dataset.event));
      }
    });

    $("#editToggle").addEventListener("click", () => {
      editMode = !editMode;
      document.body.classList.toggle("editing", editMode);
      $("#editToggle").textContent = editMode ? "完成" : "修改";
      showToast(editMode ? "可修改、新增、複製及刪除行程" : "已離開編輯模式");
    });
    $("#saveBtn").addEventListener("click", () => persist(true));
    $("#themeBtn").addEventListener("click", () => {
      const nextTheme = document.body.dataset.theme === "light" ? "dark" : "light";
      applyTheme(nextTheme);
      showToast(nextTheme === "light" ? "已切換到日光模式" : "已切換到暗黑模式");
    });
    $("#nowBtn").addEventListener("click", () => jumpToNow(true));
    $("#fab").addEventListener("click", () => openEventEditor(activeDay, null));
    $("#closeSheet").addEventListener("click", closeSheet);
    $("#cancelEvent").addEventListener("click", closeSheet);
    $("#cancelDay").addEventListener("click", closeSheet);
    $("#eventForm").addEventListener("submit", saveEventFromForm);
    $("#dayForm").addEventListener("submit", saveDayFromForm);
    sheetBackdrop.addEventListener("click", (event) => { if (event.target === sheetBackdrop) closeSheet(); });

    $("#resetBtn").addEventListener("click", () => {
      if (!confirm("確定還原到原始行程？目前儲存的修改會被覆蓋。")) return;
      trip = deepClone(STARTER_DATA);
      refreshMomentFocus();
      persist(false);
      render();
      jumpToNow(false);
      showToast("已還原原版行程");
    });

    $("#exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(trip, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "Nagoya_Trip_Backup.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast("已匯出 JSON 備份");
    });

    $("#importBtn").addEventListener("click", () => $("#importFile").click());
    $("#importFile").addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!Array.isArray(parsed) || !parsed.length) throw new Error("格式不正確");
        trip = parsed;
        refreshMomentFocus();
        persist(false);
        render();
        jumpToNow(false);
        showToast("已匯入備份並儲存");
      } catch (error) {
        alert("匯入失敗：" + error.message);
      } finally {
        event.target.value = "";
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeSheet();
      if (event.key === "ArrowLeft") goToDay(activeDay - 1);
      if (event.key === "ArrowRight") goToDay(activeDay + 1);
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s") {
        event.preventDefault();
        persist(true);
      }
    });

    window.addEventListener("beforeunload", () => persist(false));

    applyTheme(preferredTheme());
    refreshMomentFocus();
    render();
    jumpToNow(false);

    setInterval(() => {
      if (sheetBackdrop.classList.contains("open")) return;
      const before = JSON.stringify(momentFocus);
      refreshMomentFocus();
      if (JSON.stringify(momentFocus) !== before) renderKeepingScroll(activeDay);
    }, 60000);
  </script>
</body>
</html>
